name: telware_cross_platform
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.3
  riverpod_annotation: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.7.0
  fpdart: ^1.1.0
  story: ^1.1.0
  font_awesome_flutter: ^10.7.0
  intl: ^0.19.0
  path_provider: ^2.1.4
  http: ^1.2.2
  http_parser: ^4.0.2
  image_picker: ^1.1.2
  file_picker: ^8.1.3
  camera: ^0.11.0+2
  video_player: ^2.9.2
  path: ^1.9.0
  collection: ^1.18.0
  image_cropper: ^8.0.2
  signature: ^5.5.0
  permission_handler: ^11.3.1
  image: ^4.3.0
  vibration: ^2.0.1
  flutter_shakemywidget: ^1.0.5+1
  fluttertoast: ^8.2.8
  phone_form_field: ^9.2.8
  webview_flutter_plus: ^0.4.7
  flutter_dotenv: ^5.2.1
  go_router: ^14.3.0
  url_launcher: ^6.3.1
  gif: ^2.3.0
  lottie: ^3.1.3
  fast_contacts: ^4.0.0
  flexible_scrollbar: ^0.1.3
  mockito: ^5.0.0
  flutter_switch: ^0.3.2
  pin_code_fields: ^8.0.1
  faker: ^2.2.0
  socket_io_client: ^3.0.2
  custom_image_crop: ^0.0.13
  uuid: ^4.5.1
  audio_waveforms: ^1.1.1
  flutter_svg: ^2.0.16
  flutter_sliding_up_panel: ^2.1.1
  flutter_cupertino_datetime_picker: ^3.0.0
  mime: ^1.0.0
  just_audio: ^0.9.42
  open_file: ^3.5.10
  emoji_picker_flutter: ^3.1.0
  firebase_core: ^3.8.1
  flutter_webrtc: ^0.12.3
  cloud_firestore: ^5.5.1
  encrypt: ^5.0.3
  skeletonizer: ^1.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.13
  build_runner: ^2.4.13
  custom_lint: ^0.6.8
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.1
  build_web_compilers: ^4.0.4
  integration_test:
    sdk: flutter
  riverpod: any

dependency_overrides:
  intl: 0.20.2

flutter_launcher_icons:
  image_path: "assets/icon/app_icon_white.png"
  android: "launcher_icon"
  image_path_android: "assets/icon/app_icon_white.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/icon/background.png"
  adaptive_icon_foreground: "assets/icon/foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/imgs/
    - assets/audio/
    - assets/icon/
    - assets/gifs/
    - assets/tgs/
    - assets/json/
    - assets/webpages/
    - assets/video/
    - assets/svg/
    - lib/.env
