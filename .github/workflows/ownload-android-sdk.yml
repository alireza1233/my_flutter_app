name: Download Android SDK Platform 33

on:
  workflow_dispatch:  # 手动触发，方便您随时运行

jobs:
  download-sdk:
    runs-on: ubuntu-latest  # 使用 Ubuntu 环境，网络和工具支持好
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # 检出代码，以便后续上传

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'  # sdkmanager 需要 Java 17

      - name: Set up Android SDK directory
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Download sdkmanager
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-latest.zip
          unzip -q commandlinetools-linux-latest.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          rm commandlinetools-linux-latest.zip

      - name: Accept SDK Licenses
        run: |
          yes | sdkmanager --licenses

      - name: Download Android SDK Platform 33
        run: |
          sdkmanager "platforms;android-33"

      - name: Prepare artifact
        run: |
          # 压缩目标文件夹
          zip -r android-33-platform.zip $ANDROID_HOME/platforms/android-33

      - name: Upload artifact to repository
        uses: actions/upload-artifact@v4
        with:
          name: android-33-sdk
          path: android-33-platform.zip
          # 文件将上传到 workflow run 的 'Summary' 页面
