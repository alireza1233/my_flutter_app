name: RAR Split and Upload to Release (Flutter 3.41.5)

on:
  workflow_dispatch:

jobs:
  rar-split-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      - name: Install pub dependencies
        run: flutter pub get

      - name: Run build_runner to generate .g.dart files
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Build debug APK to trigger Gradle downloads
        run: flutter build apk --debug
        continue-on-error: true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Download ALL Gradle dependencies
        run: |
          cd android
          ./gradlew dependencies --no-daemon
        continue-on-error: true

      - name: Compress pub-cache
        run: |
          PUB_CACHE_DIR="${PUB_CACHE:-/home/runner/.pub-cache}"
          if [ -d "$PUB_CACHE_DIR" ] && [ "$(ls -A $PUB_CACHE_DIR)" ]; then
            tar -czf pub-cache.tar.gz -C "$PUB_CACHE_DIR" .
          else
            echo "ERROR: Pub cache empty"
            exit 1
          fi

      - name: Compress Gradle caches
        run: |
          if [ -d ~/.gradle/caches ] && [ "$(ls -A ~/.gradle/caches)" ]; then
            tar -czf gradle-caches.tar.gz -C ~/.gradle/caches .
          fi

      - name: Compress Gradle wrapper
        run: |
          if [ -d ~/.gradle/wrapper ] && [ "$(ls -A ~/.gradle/wrapper)" ]; then
            tar -czf gradle-wrapper.tar.gz -C ~/.gradle/wrapper .
          fi

      - name: Install RAR
        run: |
          sudo apt-get update
          sudo apt-get install rar -y

      - name: Split tar.gz files into RAR volumes (max 400MB each, with recovery)
        run: |
          mkdir -p rar-parts
          for file in pub-cache.tar.gz gradle-caches.tar.gz gradle-wrapper.tar.gz; do
            if [ -f "$file" ]; then
              base="${file%.tar.gz}"
              echo "Creating RAR volumes (max 400MB) for $file ..."
              rar a -v400m -rr10% -ep1 "rar-parts/${base}.rar" "$file"
            fi
          done
          ls -lh rar-parts/

      - name: Create GitHub Release and upload RAR parts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: deps-rar-${{ github.run_number }}
          name: "Dependencies Cache (max 400MB parts) - Flutter 3.41.5"
          body: |
            فایل‌های کش برای بیلد آفلاین با Flutter 3.41.5
            - هر قطعه حداکثر 400 مگابایت، دارای Recovery Record 10%
            - پس از دانلود تمام قطعات هر دسته، با WinRAR یا 7-Zip فایل part1.rar را Extract کنید تا فایل tar.gz بازسازی شود.
          files: rar-parts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
