name: RAR Split and Push Dependencies (Flutter 3.41.5)

on:
  workflow_dispatch:

jobs:
  rar-split-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'   # دقیقاً نسخه شما

      - name: Install pub dependencies
        run: flutter pub get

      - name: Run build_runner to generate .g.dart files (offline-ready)
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Build debug APK to trigger Gradle downloads
        run: flutter build apk --debug
        continue-on-error: true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Download ALL Gradle dependencies
        run: |
          cd android
          ./gradlew dependencies --no-daemon
        continue-on-error: true

      - name: Compress pub-cache with correct version
        run: |
          PUB_CACHE_DIR="${PUB_CACHE:-/home/runner/.pub-cache}"
          if [ -d "$PUB_CACHE_DIR" ] && [ "$(ls -A $PUB_CACHE_DIR)" ]; then
            tar -czf pub-cache.tar.gz -C "$PUB_CACHE_DIR" .
          else
            echo "ERROR: Pub cache empty"
            exit 1
          fi

      - name: Compress Gradle caches
        run: |
          if [ -d ~/.gradle/caches ] && [ "$(ls -A ~/.gradle/caches)" ]; then
            tar -czf gradle-caches.tar.gz -C ~/.gradle/caches .
          fi

      - name: Compress Gradle wrapper
        run: |
          if [ -d ~/.gradle/wrapper ] && [ "$(ls -A ~/.gradle/wrapper)" ]; then
            tar -czf gradle-wrapper.tar.gz -C ~/.gradle/wrapper .
          fi

      - name: Install RAR
        run: |
          sudo apt-get update
          sudo apt-get install rar -y

      - name: Split tar.gz files into RAR volumes (50MB each, with recovery)
        run: |
          mkdir -p rar-parts
          for file in pub-cache.tar.gz gradle-caches.tar.gz gradle-wrapper.tar.gz; do
            if [ -f "$file" ]; then
              base="${file%.tar.gz}"
              echo "Creating RAR volumes for $file ..."
              rar a -v50m -rr10% -ep1 "rar-parts/${base}.rar" "$file"
            fi
          done
          ls -lh rar-parts/

      - name: Commit and push RAR parts to repository (no LFS)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add rar-parts/
          git commit -m "Add RAR split parts (50MB each, Flutter 3.41.5) [skip ci]" || echo "No changes"
          git push origin main
