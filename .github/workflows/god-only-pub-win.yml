name: 🔥 FULL Build but Upload ONLY Pub Cache

on: workflow_dispatch

jobs:
  build-complete-offline:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout YOUR messenger app (public repo)
        uses: actions/checkout@v4
        with:
          repository: alireza1233/my_flutter_app
          path: my_app

      - name: Setup Flutter stable 3.24.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Setup JDK 11, 17, 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            11
            17
            21
          java-package: jdk

      - name: Install full Android SDK
        shell: pwsh
        run: |
          $androidHome = "$env:LOCALAPPDATA\Android\Sdk"
          $env:ANDROID_HOME = $androidHome
          $env:ANDROID_SDK_ROOT = $androidHome
          mkdir -Force $androidHome | Out-Null

          $toolsDir = "$androidHome\cmdline-tools"
          $latestDir = "$toolsDir\latest"
          $sdkmanagerPath = "$latestDir\bin\sdkmanager.bat"

          if (!(Test-Path $sdkmanagerPath)) {
            Write-Host "Downloading command line tools..."
            $zipFile = "sdk-tools.zip"
            curl -o $zipFile https://dl.google.com/android/repository/commandlinetools-win-11076708_latest.zip
            $tempExtract = Join-Path $env:TEMP "cmdline-tools-extract"
            Remove-Item -Path $tempExtract -Recurse -Force -ErrorAction SilentlyContinue
            Expand-Archive -Path $zipFile -DestinationPath $tempExtract -Force

            $sdkmanagerFile = Get-ChildItem -Path $tempExtract -Recurse -Filter "sdkmanager.bat" | Select-Object -First 1
            if (-not $sdkmanagerFile) {
              Write-Error "sdkmanager.bat not found in extracted files!"
              exit 1
            }

            New-Item -ItemType Directory -Path $latestDir -Force | Out-Null
            $sourceRoot = $sdkmanagerFile.Directory.Parent
            Copy-Item -Path "$($sourceRoot.FullName)\*" -Destination $latestDir -Recurse -Force

            Remove-Item $zipFile -Force
            Remove-Item $tempExtract -Recurse -Force
          }

          if (Test-Path "$latestDir\bin\sdkmanager.bat") {
            $sdkmanager = "$latestDir\bin\sdkmanager.bat"
          } else {
            Write-Error "sdkmanager.bat not found after extraction!"
            exit 1
          }
          Write-Host "Using sdkmanager: $sdkmanager"

          for ($i=0; $i -lt 10; $i++) { echo y | & $sdkmanager --licenses 2>&1 > $null }

          $platforms = 21..35 | ForEach-Object { "platforms;android-$_" }
          $buildTools = @(
            "35.0.0","34.0.0","33.0.2","33.0.1","33.0.0","32.0.0","31.0.0","30.0.3",
            "29.0.3","28.0.3","27.0.3","26.0.3","25.0.3","24.0.3","23.0.3"
          ) | ForEach-Object { "build-tools;$_" }
          $ndks = @(
            "26.3.11579264","27.0.12077973","25.2.9519653","23.2.8568313","21.4.7075529"
          ) | ForEach-Object { "ndk;$_" }
          $other = @(
            "cmake;3.22.1",
            "emulator",
            "extras;google;m2repository",
            "extras;android;m2repository",
            "platform-tools",
            "system-images;android-34;google_apis;x86_64",
            "system-images;android-33;google_apis;x86_64",
            "system-images;android-30;google_apis;x86_64",
            "system-images;android-29;google_apis;x86_64",
            "system-images;android-34;google_apis_playstore;x86_64",
            "extras;intel;Hardware_Accelerated_Execution_Manager"
          )
          $allPackages = $platforms + $buildTools + $ndks + $other
          $batchSize = 20
          for ($i=0; $i -lt $allPackages.Count; $i += $batchSize) {
            $batch = $allPackages[$i..($i+$batchSize-1)] -join " "
            Write-Host "Installing batch $i : $batch"
            & $sdkmanager $batch --verbose
          }
          & $sdkmanager --list

      - name: Install Visual Studio Build Tools 2022 + Windows SDK
        shell: pwsh
        run: |
          choco install visualstudio2022buildtools -y --no-progress
          choco install visualstudio2022-workload-vctools -y --no-progress

          $vsPaths = @(
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools",
            "C:\Program Files\Microsoft Visual Studio\2022\BuildTools"
          )
          $msvcLatest = $null
          foreach ($vsPath in $vsPaths) {
            $msvcPath = Join-Path $vsPath "VC\Tools\MSVC"
            if (Test-Path $msvcPath) {
              $msvcLatest = Get-ChildItem $msvcPath -Directory | Sort-Object Name -Descending | Select-Object -First 1
              if ($msvcLatest) { break }
            }
          }

          $sdkBinPath = "C:\Program Files (x86)\Windows Kits\10\bin"
          $sdkLatest = Get-ChildItem "$sdkBinPath\10.0.*" -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1

          if ($msvcLatest -and $sdkLatest) {
            $env:PATH = "$($msvcLatest.FullName)\bin\Hostx64\x64;$($sdkLatest.FullName)\x64;$env:PATH"
            Write-Host "MSVC found at: $($msvcLatest.FullName)"
            Write-Host "Windows SDK found at: $($sdkLatest.FullName)"
          } else {
            Write-Warning "MSVC or Windows SDK not found, but continuing"
          }

      - name: Pre-cache ALL Gradle distributions and common plugins
        shell: pwsh
        run: |
          $gradleUserHome = "$env:USERPROFILE\.gradle"
          mkdir -Force "$gradleUserHome\wrapper\dists" | Out-Null
          $versions = @("6.5","6.6.1","6.7.1","6.8.3","6.9.4","7.0.2","7.1.1","7.2","7.3.3","7.4.2","7.5.1","7.6.4","8.0.2","8.1.1","8.2.1","8.3","8.4","8.5","8.6","8.7")
          foreach ($ver in $versions) {
            $url = "https://services.gradle.org/distributions/gradle-$ver-bin.zip"
            $dest = "$gradleUserHome\wrapper\dists\gradle-$ver-bin"
            mkdir -Force $dest -ErrorAction SilentlyContinue
            $zipFile = "$dest\gradle-$ver-bin.zip"
            if (!(Test-Path $zipFile)) {
              curl -L -o $zipFile $url
              Expand-Archive -Path $zipFile -DestinationPath $dest -Force
            }
          }
          New-Item -ItemType Directory -Path "gradle-cache-builder" -Force | Out-Null
          Set-Location "gradle-cache-builder"

          if (Test-Path "../my_app/gradlew.bat") {
            Copy-Item -Path "../my_app/gradlew" -Destination "." -Force
            Copy-Item -Path "../my_app/gradlew.bat" -Destination "." -Force
            Copy-Item -Path "../my_app/gradle" -Destination "." -Recurse -Force
          } else {
            Write-Warning "my_app gradlew not found, creating dummy"
            '@echo off' | Out-File -FilePath "gradlew.bat" -Encoding ascii
            'echo dummy' | Out-File -FilePath "gradlew.bat" -Encoding ascii -Append
          }

          $gradleBuildScript = @"
          buildscript {
              repositories { mavenCentral() google() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.5.0'
                  classpath 'com.google.gms:google-services:4.4.0'
                  classpath 'com.google.firebase:firebase-crashlytics-gradle:2.9.9'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22'
                  classpath 'com.google.dagger:hilt-android-gradle-plugin:2.48'
              }
          }
          allprojects { repositories { mavenCentral() google() } }
          "@
          $gradleBuildScript | Out-File -FilePath "build.gradle" -Encoding ascii
          New-Item -ItemType Directory -Path "app" -Force | Out-Null

          if (Test-Path ".\gradlew.bat") {
            .\gradlew --no-daemon dependencies > $null 2>&1
          }
          Set-Location ..

      # ============================================================
      #  مرحله کامنت شده قبلی - الآن فعال و کامل شده
      #  Build extra Pub Cache (many packages)
      # ============================================================
      - name: Build extra Pub Cache (many packages)
        shell: pwsh
        run: |
          $pubCache = if ($env:PUB_CACHE) { $env:PUB_CACHE } else { "$env:LOCALAPPDATA\Pub\Cache" }
          Write-Host "Pub Cache location: $pubCache"
          # نصب پکیج‌های اضافی به صورت global
          $packages = @(
            "build_runner", "riverpod_generator", "hive_generator", "flutter_gen_runner",
            "very_good_cli", "dart_style", "flutter_lints", "mockito", "sqflite_common_ffi",
            "path_provider", "shared_preferences", "dio", "get_it", "bloc", "flutter_bloc",
            "equatable", "json_serializable", "retrofit_generator", "freezed", "floor_generator",
            "drift_dev", "flutter_native_splash", "flutter_launcher_icons", "icons_launcher"
          )
          foreach ($pkg in $packages) {
            flutter pub global activate $pkg
          }
          flutter pub global list

      - name: Generate code with build_runner (Riverpod & Hive)
        shell: pwsh
        run: |
          cd my_app
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build YOUR messenger app to cache all project-specific dependencies
        shell: pwsh
        run: |
          cd my_app
          flutter build apk --debug
          flutter build apk --release
          flutter build windows --debug
          flutter build windows --release
          cd android
          .\gradlew dependencies --no-daemon
          .\gradlew assembleRelease --no-daemon
          cd ../..

      - name: Assemble ultimate offline folder (but we will only use its pub-cache later)
        shell: pwsh
        run: |
          $target = "flutter-offline-full"
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          # فقط برای تکمیل pub-cache نیاز نیست همه چیز را کپی کنیم، ولی برای اطمینان از کامل بودن کش، مراحل قبلی کافی است.
          # ما در این مرحله فقط پوشه pub-cache را برای آپلود نهایی نگه می‌داریم.
          Write-Host "Offline folder assembled (but won't be uploaded entirely)."

      - name: Install 7-Zip
        shell: pwsh
        run: |
          choco install 7zip -y --no-progress
          $env:PATH = "C:\Program Files\7-Zip;$env:PATH"

      # ============================================================
      # آپلود فقط Pub Cache (نه کل باندل)
      # ============================================================
      - name: Archive ONLY Pub Cache folder
        shell: pwsh
        run: |
          $pubCache = if ($env:PUB_CACHE) { $env:PUB_CACHE } else { "$env:LOCALAPPDATA\Pub\Cache" }
          & "C:\Program Files\7-Zip\7z.exe" a -t7z -mx=9 -md=64m -mmt=on "pub-cache-full.7z" $pubCache -bsp1 -bse1
          Write-Host "Pub Cache archive size: $([math]::Round((Get-Item 'pub-cache-full.7z').Length / 1GB, 2)) GB"

      - name: Test archive integrity
        shell: pwsh
        run: |
          & "C:\Program Files\7-Zip\7z.exe" t "pub-cache-full.7z"
          if ($LASTEXITCODE -ne 0) { throw "Archive is corrupted!" }

      - name: Split archive with split command (Git Bash)
        shell: bash
        run: |
          echo "Splitting into 1.8GB chunks..."
          split -b 1800M -a 2 -d --verbose pub-cache-full.7z "pub-cache.7z.part"
          echo "Completed. Parts:"
          ls -lh pub-cache.7z.part*

      - name: Create GitHub Release
        id: create_release
        run: |
          $tag = "pub-cache-only-v$((Get-Date -Format 'yyyyMMdd-HHmmss'))"
          echo "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          gh release create $tag --title "Pub Cache Only (Fully Built with Full Workflow)" --notes "Download all .part files, then combine with copy /b pub-cache.7z.part* pub-cache-full.7z and extract." --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      - name: Upload split parts to Release
        run: |
          Get-ChildItem -Filter "pub-cache.7z.part*" | ForEach-Object {
            gh release upload $env:RELEASE_TAG "$($_.FullName)" --clobber --repo "${{ github.repository }}"
            Write-Host "Uploaded $($_.Name) ($([math]::Round($_.Length/1MB,2)) MB)"
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      - name: Upload combine script
        run: |
          $scriptContent = @"
          @echo off
          echo Combining Pub Cache parts...
          copy /b pub-cache.7z.part* pub-cache-full.7z
          echo Done. Extract pub-cache-full.7z with 7-Zip.
          echo Then set PUB_CACHE environment variable to the extracted folder.
          pause
          "@
          $scriptContent | Out-File -FilePath "combine_pub_cache.bat" -Encoding ascii
          gh release upload $env:RELEASE_TAG "combine_pub_cache.bat" --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
