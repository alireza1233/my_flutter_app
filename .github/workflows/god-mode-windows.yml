# ... (همه مراحل قبل از فشرده‌سازی مثل قبل)

# ======================== COMPRESS WITH 7z (NO SPLIT) ========================
- name: Install 7-Zip
  shell: pwsh
  run: |
    choco install 7zip -y --no-progress
    $env:PATH = "C:\Program Files\7-Zip;$env:PATH"

- name: Create single 7z archive (max compression, no split)
  shell: pwsh
  run: |
    & "C:\Program Files\7-Zip\7z.exe" a -t7z -mx=9 -md=64m -mmt=on "flutter-offline-full.7z" ".\flutter-offline-full\" -bsp1 -bse1
    Write-Host "Single archive created: flutter-offline-full.7z"
    Write-Host "Size: $([math]::Round((Get-Item 'flutter-offline-full.7z').Length / 1GB, 2)) GB"

# ======================== TEST INTEGRITY BEFORE SPLIT ========================
- name: Test archive integrity
  shell: pwsh
  run: |
    & "C:\Program Files\7-Zip\7z.exe" t "flutter-offline-full.7z"
    if ($LASTEXITCODE -ne 0) { throw "Archive is corrupted!" }

# ======================== SPLIT INTO 1.8GB CHUNKS USING BINARY SPLIT ========================
- name: Split archive with split command (Git Bash / MSYS2)
  shell: bash
  run: |
    echo "📦 Splitting flutter-offline-full.7z into 1.8GB chunks..."
    split -b 1800M -d --verbose flutter-offline-full.7z "flutter-offline.7z.part"
    echo ""
    echo "✅ Split completed. Generated parts:"
    ls -lh flutter-offline.7z.part*

# ======================== UPLOAD SPLIT PARTS TO RELEASE ========================
- name: Create GitHub Release
  id: create_release
  run: |
    $tag = "offline-bundle-v$((Get-Date -Format 'yyyyMMdd-HHmmss'))"
    echo "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
    gh release create $tag --title "Complete Flutter Offline Bundle (Split Parts)" --notes "Download all .part files, then combine and extract."
  env:
    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  shell: pwsh

- name: Upload split parts to Release
  run: |
    Get-ChildItem -Filter "flutter-offline.7z.part*" | ForEach-Object {
      gh release upload $env:RELEASE_TAG "$($_.FullName)" --clobber
      Write-Host "Uploaded $($_.Name) ($([math]::Round($_.Length/1MB,2)) MB)"
    }
  env:
    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  shell: pwsh

- name: Upload combine+extract helper script
  run: |
    @'
    @echo off
    echo ==================================================
    echo Combining split parts into one 7z archive...
    copy /b flutter-offline.7z.part00 + flutter-offline.7z.part01 + flutter-offline.7z.part02 + flutter-offline.7z.part03 + flutter-offline.7z.part04 + flutter-offline.7z.part05 + flutter-offline.7z.part06 + flutter-offline.7z.part07 + flutter-offline.7z.part08 + flutter-offline.7z.part09 + flutter-offline.7z.part10 + flutter-offline.7z.part11 + flutter-offline.7z.part12 + flutter-offline.7z.part13 + flutter-offline.7z.part14 + flutter-offline.7z.part15 flutter-offline-combined.7z
    echo.
    echo Extracting combined archive with 7-Zip...
    7z x flutter-offline-combined.7z -y
    echo.
    echo Done! Run setup.bat to configure environment.
    pause
    '@ | Out-File -FilePath "combine_and_extract.bat" -Encoding ascii
    gh release upload $env:RELEASE_TAG "combine_and_extract.bat" --clobber
  env:
    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  shell: pwsh
