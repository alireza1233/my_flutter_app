name: GOD MODE windows (Flutter + Android + Gradle + JDK) - Windows Full Offline Package

on:
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your Flutter project (if exists)
        uses: actions/checkout@v4

      - name: Setup Flutter (Windows)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Setup Java 17 (Temurin for Windows)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android licenses and install Android SDK components
        shell: pwsh
        run: |
          flutter doctor --android-licenses --quiet | Out-Null
          # Force install platform-tools, build-tools, NDK, etc.
          flutter doctor
          # Wait a moment for SDK manager to finish
          Start-Sleep -Seconds 10
          # Install NDK (if needed) and latest build-tools (optional but safe)
          $sdkmanager = "$env:ANDROID_HOME\cmdline-tools\latest\bin\sdkmanager.bat"
          & $sdkmanager --install "ndk-bundle" "build-tools;34.0.0" "platforms;android-34" | Out-Null

      - name: Install project dependencies (offline-friendly)
        shell: pwsh
        run: |
          flutter pub get
          flutter build apk --debug | Out-Null   # forces gradle to download dependencies
          Set-Location android
          .\gradlew dependencies --no-daemon
          Set-Location ..

      - name: Collect everything into one folder (Windows paths)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "full-env-windows" | Out-Null

          # 1. Flutter SDK (already cached by action)
          Copy-Item -Path "$env:FLUTTER_ROOT" -Destination "full-env-windows\flutter-sdk" -Recurse

          # 2. Android SDK (including NDK, platform-tools, emulator, etc.)
          Copy-Item -Path "$env:ANDROID_HOME" -Destination "full-env-windows\android-sdk" -Recurse

          # 3. Java JDK (Temurin 17)
          Copy-Item -Path "$env:JAVA_HOME" -Destination "full-env-windows\jdk" -Recurse

          # 4. Gradle caches (user's .gradle)
          if (Test-Path "$env:USERPROFILE\.gradle\caches") {
            New-Item -ItemType Directory -Force -Path "full-env-windows\gradle-caches" | Out-Null
            Copy-Item -Path "$env:USERPROFILE\.gradle\caches" -Destination "full-env-windows\gradle-caches\caches" -Recurse
          }
          if (Test-Path "$env:USERPROFILE\.gradle\wrapper") {
            New-Item -ItemType Directory -Force -Path "full-env-windows\gradle-wrapper" | Out-Null
            Copy-Item -Path "$env:USERPROFILE\.gradle\wrapper" -Destination "full-env-windows\gradle-wrapper\wrapper" -Recurse
          }

          # 5. Pub Cache (Dart packages)
          $pubCache = if ($env:PUB_CACHE) { $env:PUB_CACHE } else { "$env:LOCALAPPDATA\Pub\Cache" }
          if (Test-Path $pubCache) {
            Copy-Item -Path $pubCache -Destination "full-env-windows\pub-cache" -Recurse
          }

          # 6. Android config (licenses, debug keystore, etc.)
          if (Test-Path "$env:USERPROFILE\.android") {
            Copy-Item -Path "$env:USERPROFILE\.android" -Destination "full-env-windows\android-config" -Recurse
          }

          # 7. Save environment variables info
          Get-ChildItem env: | Out-File -FilePath "full-env-windows\env-info.txt"

          Write-Host "✅ All environment collected in .\full-env-windows"

      - name: Compress entire folder with 7zip (better than tar on Windows)
        shell: pwsh
        run: |
          # Use built-in Compress-Archive or 7zip – Compress-Archive is slower but works
          Compress-Archive -Path .\full-env-windows\* -DestinationPath .\full-build-env-windows.zip -CompressionLevel Optimal
          # If you want to split into 1.8GB parts, uncomment below:
          # $bytes = 1800MB
          # $i = 0
          # $inputFile = "full-build-env-windows.zip"
          # $stream = [System.IO.File]::OpenRead($inputFile)
          # while ($stream.Position -lt $stream.Length) {
          #   $remaining = $stream.Length - $stream.Position
          #   $size = [Math]::Min($bytes, $remaining)
          #   $buffer = New-Object byte[] $size
          #   $stream.Read($buffer, 0, $size) | Out-Null
          #   $partFile = "full-build-env.part.{0:D3}" -f $i
          #   [System.IO.File]::WriteAllBytes($partFile, $buffer)
          #   $i++
          # }
          # $stream.Close()

      - name: Upload as single artifact (or release)
        uses: actions/upload-artifact@v4
        with:
          name: full-build-env-windows
          path: .\full-build-env-windows.zip
          if-no-files-found: error
          retention-days: 7

      - name: Optionally create GitHub Release and upload split parts (if size > 2GB)
        if: always()
        run: |
          $tag = "env-windows-${{ github.run_number }}"
          gh release create $tag --title "Full Build Environment Windows ${{ github.run_number }}" --notes "Complete offline environment for Flutter/Android on Windows" || true
          gh release upload $tag .\full-build-env-windows.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
