name: Download All Dependencies (Complete)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      # نصب وابستگی‌های pub
      - name: Install dependencies
        run: flutter pub get

      # تولید فایل‌های g.dart (ضروری برای کامپایل)
      - name: Generate code with build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      # بیلد debug (دانلود وابستگی‌های debug مانند arm64_v8a_debug)
      - name: Build debug APK (triggers Gradle downloads for debug)
        run: flutter build apk --debug

      # بیلد release (دانلود وابستگی‌های release مانند arm64_v8a_release)
      - name: Build release APK (triggers Gradle downloads for release)
        run: flutter build apk --release

      # آپلود کل pub-cache (همه پکیج‌های Dart/Flutter)
      - name: Upload pub-cache
        uses: actions/upload-artifact@v4
        with:
          name: pub-cache
          path: ~/.pub-cache

      # آپلود کل پوشه .gradle (شامل caches, wrapper, daemon, ...)
      - name: Upload entire .gradle folder
        uses: actions/upload-artifact@v4
        with:
          name: gradle-full
          path: ~/.gradle

      # آپلود جداگانه wrapper (برای احتیاط)
      - name: Upload gradle-wrapper separately
        uses: actions/upload-artifact@v4
        with:
          name: gradle-wrapper
          path: ~/.gradle/wrapper
