name: Download All Dependencies (Final)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - name: Install dependencies
        run: flutter pub get

      - name: Build runner (generate missing .g.dart files)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build debug APK (downloads all Gradle dependencies)
        id: build
        run: flutter build apk --debug
        continue-on-error: true   # حتی اگر خطا داشت، ادامه بده

      - name: Upload pub-cache
        uses: actions/upload-artifact@v4
        with:
          name: pub-cache
          path: ~/.pub-cache

      - name: Upload Gradle caches
        uses: actions/upload-artifact@v4
        with:
          name: gradle-caches
          path: ~/.gradle/caches

      - name: Upload gradle-wrapper
        uses: actions/upload-artifact@v4
        with:
          name: gradle-wrapper
          path: ~/.gradle/wrapper
