name: Download All Dependencies (Ultimate)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - name: Get packages
        run: flutter pub get

      - name: Run build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload pub-cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pub-cache
          path: ~/.pub-cache

      - name: Upload Gradle caches
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-caches
          path: ~/.gradle/caches

      - name: Upload gradle-wrapper
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-wrapper
          path: ~/.gradle/wrapper
