name: Download All Dependencies (Safe Mode)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      # نصب پکیج‌های pub
      - name: Install dependencies
        run: flutter pub get

      # Precache موتور فلاتر برای android
      - name: Precache Flutter artifacts
        run: flutter precache --android

      # دانلود وابستگی‌های Gradle با استفاده از task مخصوص Flutter
      - name: Download Gradle dependencies via Flutter task
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:downloadDebugAndroidDependencies --no-daemon
          ./gradlew :app:downloadReleaseAndroidDependencies --no-daemon

      # آپلود pub-cache
      - name: Upload pub-cache
        uses: actions/upload-artifact@v4
        with:
          name: pub-cache
          path: ~/.pub-cache

      # آپلود کل .gradle
      - name: Upload gradle-full
        uses: actions/upload-artifact@v4
        with:
          name: gradle-full
          path: ~/.gradle

      # آپلود wrapper (تضمین)
      - name: Upload gradle-wrapper
        uses: actions/upload-artifact@v4
        with:
          name: gradle-wrapper
          path: ~/.gradle/wrapper
