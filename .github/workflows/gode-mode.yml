name: GOD MODE (Flutter + Android + Gradle + JDK)

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository (for version info)
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - name: Setup Java 17 (Temurin) explicitly
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies and force Gradle to download everything
        run: |
          flutter pub get
          flutter build apk --debug || true
          cd android
          chmod +x gradlew
          ./gradlew dependencies --no-daemon || true
          cd ..

      - name: Collect entire environment into one folder
        run: |
          mkdir -p full-env
          cp -r $FLUTTER_ROOT full-env/flutter-sdk
          cp -r $ANDROID_HOME full-env/android-sdk
          cp -r $JAVA_HOME full-env/jdk
          mkdir -p full-env/gradle-caches
          cp -r ~/.gradle/caches full-env/gradle-caches/
          cp -r ~/.gradle/wrapper full-env/gradle-wrapper
          cp -r ~/.pub-cache full-env/pub-cache
          if [ -d ~/.android ]; then
            cp -r ~/.android full-env/android-config
          fi
          env > full-env/env-info.txt
          echo "All environment collected in ./full-env"

      - name: Compress full environment
        run: tar -czf full-build-env.tar.gz -C ./full-env .

      - name: Split archive into 1.8GB parts
        run: split -b 1800M -d -a 3 full-build-env.tar.gz full-build-env.part.

      - name: Create GitHub Release
        run: |
          TAG="env-${{ github.run_number }}"
          gh release create "$TAG" --title "Full Build Environment ${{ github.run_number }}" --notes "Split parts due to size limit" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload split parts to Release
        run: |
          for part in full-build-env.part.*; do
            echo "Uploading $part ..."
            gh release upload "env-${{ github.run_number }}" "$part" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
