name: Build Flutter APK and Commit to my-build folder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          flutter-version: '3.24.3'

      - name: Clean everything
        run: |
          flutter clean
          rm -rf .dart_tool
          rm -rf build
          rm -rf android/.gradle
          rm -rf android/app/build

      - name: Install dependencies
        run: flutter pub get

      - name: Generate missing code
        run: |
          flutter pub run build_runner clean
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Create my-build directory
        run: mkdir -p my-build

      - name: Copy APK to my-build folder
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk my-build/app-debug.apk || true
          cp build/app/outputs/flutter-apk/app-release.apk my-build/app-release.apk || true

      - name: Commit and push APK to my-build folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add APK build #${{ github.run_number }} to my-build folder"
          branch: main
          file_pattern: 'my-build/*.apk'
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
          commit_author: "GitHub Actions Bot <actions@github.com>"
