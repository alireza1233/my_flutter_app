name: Build Flutter APK and Commit to my-build folder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          flutter-version: '3.24.3'

      - name: Clean previous build
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Generate missing code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK (release) with split-per-abi
        run: flutter build apk --release --split-per-abi

      - name: Create my-build directory
        run: mkdir -p my-build

      - name: Copy APK to my-build folder
        run: cp build/app/outputs/flutter-apk/app-*-release.apk my-build/

      - name: Force sync with remote and commit
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git reset --hard origin/main
          git add my-build/*.apk
          git commit -m "Add APK build #${{ github.run_number }} to my-build folder"
          git push --force-with-lease origin main
