name: Inspect Complete Build Environment

on: workflow_dispatch

jobs:
  inspect:
    name: Inspect Environment
    runs-on: ubuntu-latest

    steps:
      # 1. اطلاعات پایه سیستم
      - name: Print OS Info
        run: |
          echo "=== OS Info ==="
          uname -a
          lsb_release -a
          echo "==================="

      # 2. بررسی Java و JDK (ورژن پیش‌فرض رانر)
      - name: Check Java Version
        run: |
          echo "=== Java Version ==="
          java -version
          echo "==================="

      # 3. بررسی Android SDK
      - name: Check Android SDK
        run: |
          echo "=== Android SDK Directories ==="
          ls -la /usr/local/lib/android/sdk/platforms/
          echo "================================"

      # 4. بررسی Android NDK
      - name: Check Android NDK
        run: |
          echo "=== Android NDK Directories ==="
          ls -la /usr/local/lib/android/sdk/ndk/
          echo "==============================="

      # 5. نصب و بررسی Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - name: Check Flutter Version
        run: |
          echo "=== Flutter Version ==="
          flutter --version
          echo "======================="

      # 6. بررسی Gradle Wrapper و AGP
      - name: Check Gradle & AGP
        run: |
          # اگر فایل gradle-wrapper.properties وجود داشته باشد
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "=== Gradle Wrapper Version ==="
            grep "distributionUrl" android/gradle/wrapper/gradle-wrapper.properties
            echo "=============================="
          fi
          
          # استخراج نسخه AGP از build.gradle
          if [ -f "android/build.gradle" ]; then
            echo "=== AGP Version from build.gradle ==="
            grep "com.android.tools.build:gradle:" android/build.gradle || echo "AGP version not found in build.gradle"
            echo "====================================="
          fi

      # 7. بررسی متغیرهای محیطی مهم
      - name: Print Important Environment Variables
        run: |
          echo "=== Home and Env Vars ==="
          echo "HOME: $HOME"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "JAVA_HOME: $JAVA_HOME"
          echo "GRADLE_USER_HOME: $GRADLE_USER_HOME"
          echo "========================="

      # 8. اطلاعات دقیق از کش‌های Gradle
      - name: Check Gradle Caches
        run: |
          if [ -d "$HOME/.gradle/caches/modules-2/files-2.1/com.android.tools.build/gradle/" ]; then
            echo "=== AGP Versions in Cache ==="
            ls "$HOME/.gradle/caches/modules-2/files-2.1/com.android.tools.build/gradle/"
            echo "============================="
          fi
