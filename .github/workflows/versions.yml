name: Save Full Build Log to Repository

on:
  workflow_dispatch:

jobs:
  save-log:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Collect system info
        run: |
          mkdir -p logs
          {
            echo "===== OS Info ====="
            uname -a
            lsb_release -a 2>/dev/null || echo "lsb_release not available"
            echo "===== Java Version ====="
            java -version 2>&1
            echo "===== Android SDK Platforms ====="
            ls -la /usr/local/lib/android/sdk/platforms/ 2>/dev/null || echo "No SDK platforms dir"
            echo "===== Android NDK ====="
            ls -la /usr/local/lib/android/sdk/ndk/ 2>/dev/null || echo "No NDK dir"
          } | tee -a logs/inspect.txt

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - name: Collect Flutter & Gradle info
        run: |
          {
            echo "===== Flutter Version ====="
            flutter --version
            echo "===== Android Project Gradle Wrapper ====="
            if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
              cat android/gradle/wrapper/gradle-wrapper.properties
            else
              echo "gradle-wrapper.properties not found"
            fi
            echo "===== AGP in build.gradle (if any) ====="
            if [ -f "android/build.gradle" ]; then
              grep "com.android.tools.build:gradle:" android/build.gradle || echo "Not found"
            fi
            echo "===== Environment Variables ====="
            env | sort
          } | tee -a logs/inspect.txt

      - name: Commit and push logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git commit -m "Add full build inspection log [skip ci]" || echo "No changes to commit"
          git push origin main
