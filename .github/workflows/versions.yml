name: Save Full Build Environment to Repository

on:
  workflow_dispatch:

jobs:
  save-env:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # اجازه commit و push به مخزن
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - name: Set Android tools PATH
        run: |
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH

      - name: Collect environment info
        run: |
          mkdir -p env-info
          OUTPUT_FILE="env-info/inspect_full.txt"

          echo "===== OS Info =====" > $OUTPUT_FILE
          uname -a >> $OUTPUT_FILE
          cat /etc/os-release >> $OUTPUT_FILE
          echo "" >> $OUTPUT_FILE

          echo "===== Java Version =====" >> $OUTPUT_FILE
          java -version 2>&1 >> $OUTPUT_FILE
          echo "" >> $OUTPUT_FILE

          echo "===== Android SDK =====" >> $OUTPUT_FILE
          echo "ANDROID_HOME: $ANDROID_HOME" >> $OUTPUT_FILE
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT" >> $OUTPUT_FILE
          echo "Platforms:" >> $OUTPUT_FILE
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null >> $OUTPUT_FILE || echo "No platforms dir" >> $OUTPUT_FILE
          echo "Build-tools:" >> $OUTPUT_FILE
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null >> $OUTPUT_FILE || echo "No build-tools" >> $OUTPUT_FILE
          echo "" >> $OUTPUT_FILE

          echo "===== Android NDK =====" >> $OUTPUT_FILE
          ls -la $ANDROID_HOME/ndk/ 2>/dev/null >> $OUTPUT_FILE || echo "No NDK" >> $OUTPUT_FILE
          if [ -n "$ANDROID_NDK" ] && [ -d "$ANDROID_NDK" ]; then
            cat $ANDROID_NDK/source.properties 2>/dev/null >> $OUTPUT_FILE
          fi
          echo "" >> $OUTPUT_FILE

          echo "===== Android Emulator, ADB, Fastboot =====" >> $OUTPUT_FILE
          emulator -version 2>&1 >> $OUTPUT_FILE || echo "emulator not found" >> $OUTPUT_FILE
          adb version 2>&1 >> $OUTPUT_FILE || echo "adb not found" >> $OUTPUT_FILE
          fastboot --version 2>&1 >> $OUTPUT_FILE || echo "fastboot not found" >> $OUTPUT_FILE
          echo "" >> $OUTPUT_FILE

          echo "===== Flutter & Dart =====" >> $OUTPUT_FILE
          flutter --version >> $OUTPUT_FILE
          dart --version >> $OUTPUT_FILE
          echo "Flutter doctor -v:" >> $OUTPUT_FILE
          flutter doctor -v >> $OUTPUT_FILE
          echo "" >> $OUTPUT_FILE

          echo "===== Gradle (system) =====" >> $OUTPUT_FILE
          gradle --version 2>&1 >> $OUTPUT_FILE || echo "Gradle not in PATH" >> $OUTPUT_FILE
          echo "" >> $OUTPUT_FILE

          echo "===== Project Gradle Wrapper =====" >> $OUTPUT_FILE
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            cat android/gradle/wrapper/gradle-wrapper.properties >> $OUTPUT_FILE
          else
            echo "No gradle-wrapper.properties found" >> $OUTPUT_FILE
          fi
          echo "" >> $OUTPUT_FILE

          echo "===== AGP version =====" >> $OUTPUT_FILE
          if [ -f "android/build.gradle" ]; then
            grep "com.android.tools.build:gradle" android/build.gradle >> $OUTPUT_FILE || echo "AGP version not found" >> $OUTPUT_FILE
          fi
          echo "" >> $OUTPUT_FILE

          echo "===== Environment Variables (filtered) =====" >> $OUTPUT_FILE
          env | sort | grep -E "JAVA|ANDROID|GRADLE|FLUTTER|PATH|HOME|GITHUB" >> $OUTPUT_FILE
          echo "" >> $OUTPUT_FILE

          echo "===== Git & System Packages =====" >> $OUTPUT_FILE
          git --version >> $OUTPUT_FILE
          for pkg in zip unzip curl wget make gcc; do
            version=$(dpkg -l | grep -E "ii\s+$pkg" | head -1)
            echo "$pkg: ${version:-not installed}" >> $OUTPUT_FILE
          done
          echo "" >> $OUTPUT_FILE

          echo "===== CPU & Memory =====" >> $OUTPUT_FILE
          free -h >> $OUTPUT_FILE
          nproc >> $OUTPUT_FILE
          lscpu | grep "Model name" >> $OUTPUT_FILE

          echo "✅ Full environment saved to $OUTPUT_FILE"

      - name: Commit and push environment info
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add env-info/
          git commit -m "Add full environment info [skip ci]" || echo "No changes to commit"
          git push origin main
