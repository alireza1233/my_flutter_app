name: Download Android SDK Platform 33 (Windows)

on:
  workflow_dispatch:

permissions:
  contents: write  # اجازه push به مخزن

jobs:
  download-sdk:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\android-sdk\cmdline-tools" | Out-Null
          echo "ANDROID_HOME=$env:USERPROFILE\android-sdk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$env:USERPROFILE\android-sdk\cmdline-tools\latest\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download sdkmanager
        shell: pwsh
        run: |
          curl -o commandlinetools-win.zip https://dl.google.com/android/repository/commandlinetools-win-11076708_latest.zip
          Expand-Archive commandlinetools-win.zip -DestinationPath "$env:USERPROFILE\android-sdk\cmdline-tools"
          Move-Item "$env:USERPROFILE\android-sdk\cmdline-tools\cmdline-tools" "$env:USERPROFILE\android-sdk\cmdline-tools\latest" -Force
          Remove-Item commandlinetools-win.zip

      - name: Accept SDK Licenses
        shell: pwsh
        run: |
          $cmd = "$env:USERPROFILE\android-sdk\cmdline-tools\latest\bin\sdkmanager.bat"
          & $cmd --licenses | ForEach-Object { "y" | & $cmd --licenses }

      - name: Download Android SDK Platform 33
        shell: pwsh
        run: |
          $cmd = "$env:USERPROFILE\android-sdk\cmdline-tools\latest\bin\sdkmanager.bat"
          & $cmd "platforms;android-33"

      - name: Prepare and push zip to repository root
        shell: pwsh
        run: |
          # حذف فایل قبلی اگه وجود داره
          if (Test-Path "android-33-platform.zip") { Remove-Item "android-33-platform.zip" }
          
          # فشرده‌سازی
          Compress-Archive -Path "$env:USERPROFILE\android-sdk\platforms\android-33\*" -DestinationPath "android-33-platform.zip" -Force
          
          # تنظیم git و push به مخزن
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android-33-platform.zip
          git diff --quiet && git diff --staged --quiet || git commit -m "Add android-33 SDK platform zip"
          git push origin HEAD:main
