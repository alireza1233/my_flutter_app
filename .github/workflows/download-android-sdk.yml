name: Download Android SDK Platform 33 (Direct)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-sdk:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download platform-33_r01.zip directly
        shell: cmd
        run: |
          curl -o platform-33.zip https://dl.google.com/android/repository/platform-33_r01.zip

      - name: Extract zip
        shell: cmd
        run: |
          mkdir android-33
          tar -xf platform-33.zip -C android-33

      - name: Create final zip (android-33-platform.zip)
        shell: cmd
        run: |
          if exist android-33-platform.zip del android-33-platform.zip
          powershell Compress-Archive -Path "android-33\*" -DestinationPath "android-33-platform.zip" -Force

      - name: Commit and push zip to repository root
        shell: cmd
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android-33-platform.zip
          git diff --quiet && git diff --staged --quiet || git commit -m "Add android-33 SDK platform zip"
          git push origin HEAD:main
