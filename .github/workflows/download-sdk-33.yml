name: Download Android SDK Platform 33

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download platform-33_r01.zip
        shell: pwsh
        run: |
          Write-Host "Downloading platform-33_r01.zip ..."
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-33_r01.zip" -OutFile "platform-33.zip"

      - name: Extract and rename android-13 to android-33
        shell: pwsh
        run: |
          Expand-Archive -Path "platform-33.zip" -DestinationPath "extracted" -Force
          if (Test-Path "extracted\android-13") {
            Rename-Item -Path "extracted\android-13" -NewName "android-33"
          } else {
            Write-Host "❌ android-13 folder not found!"
            Get-ChildItem "extracted"
            exit 1
          }

      - name: Verify android.jar exists in android-33
        shell: pwsh
        run: |
          if (Test-Path "extracted\android-33\android.jar") {
            Write-Host "✅ android.jar found - SDK is valid."
          } else {
            Write-Host "❌ android.jar not found. Listing contents:"
            Get-ChildItem -Recurse "extracted" | Select-Object -First 20
            exit 1
          }

      - name: Create final archive (android-33-platform.zip)
        shell: pwsh
        run: |
          Compress-Archive -Path "extracted\android-33\*" -DestinationPath "android-33-platform.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-33-platform
          path: android-33-platform.zip
