name: Download and Commit Android SDK Platform 33

on:
  workflow_dispatch:

jobs:
  download-and-commit:
    runs-on: windows-latest
    permissions:
      contents: write   # برای مجاز بودن push به مخزن
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download platform-33_r01.zip
        shell: pwsh
        run: |
          Write-Host "Downloading platform-33_r01.zip ..."
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-33_r01.zip" -OutFile "platform-33.zip"

      - name: Extract and rename android-13 to android-33
        shell: pwsh
        run: |
          Expand-Archive -Path "platform-33.zip" -DestinationPath "extracted" -Force
          if (Test-Path "extracted\android-13") {
            Rename-Item -Path "extracted\android-13" -NewName "android-33"
          } else {
            Write-Host "❌ android-13 folder not found!"
            Get-ChildItem "extracted"
            exit 1
          }

      - name: Create target directory "new sdk 33"
        shell: pwsh
        run: |
          # حذف پوشه قبلی اگر وجود داره
          if (Test-Path "new sdk 33") { Remove-Item -Recurse -Force "new sdk 33" }
          New-Item -ItemType Directory -Force -Path "new sdk 33"

      - name: Copy SDK contents into "new sdk 33"
        shell: pwsh
        run: |
          Copy-Item -Path "extracted\android-33\*" -Destination "new sdk 33" -Recurse -Force

      - name: Verify android.jar exists
        shell: pwsh
        run: |
          if (Test-Path "new sdk 33\android.jar") {
            Write-Host "✅ android.jar found - SDK is ready."
          } else {
            Write-Host "❌ android.jar not found!"
            Get-ChildItem -Recurse "new sdk 33" | Select-Object -First 20
            exit 1
          }

      - name: Commit and push to repository
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "new sdk 33"
          git diff --quiet && git diff --staged --quiet || git commit -m "Add Android SDK Platform 33 to 'new sdk 33' folder"
          git push origin HEAD:main
