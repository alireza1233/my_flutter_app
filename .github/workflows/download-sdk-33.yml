name: Download Android SDK Platform 33

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download platform-33_r01.zip from Google
        shell: cmd
        run: |
          curl -o platform-33.zip https://dl.google.com/android/repository/platform-33_r01.zip

      - name: Extract zip
        shell: cmd
        run: |
          mkdir android-33-temp
          tar -xf platform-33.zip -C android-33-temp

      - name: Prepare final android-33 folder structure
        shell: cmd
        run: |
          mkdir android-33
          xcopy /E /I android-33-temp\android-33\* android-33\

      - name: Create final archive
        shell: pwsh
        run: |
          Compress-Archive -Path "android-33\*" -DestinationPath "android-33-platform.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-33-platform
          path: android-33-platform.zip
