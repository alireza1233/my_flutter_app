name: Download AGP 8.5.1 and commit to repo

on:
  workflow_dispatch:

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create minimal Gradle project and download AGP 8.5.1
        run: |
          mkdir -p temp
          cd temp
          cat > build.gradle <<EOF
          buildscript {
              repositories {
                  mavenCentral()
                  google()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.5.1'
              }
          }
          apply plugin: 'java'
          repositories {
              mavenCentral()
              google()
          }
          dependencies {
              implementation 'com.android.tools.build:gradle:8.5.1'
          }
          EOF
          gradle dependencies --refresh-dependencies --no-daemon

      - name: Copy downloaded AGP cache to repository folder
        run: |
          mkdir -p agp-cache/com/android/tools/build/gradle/8.5.1/
          cp -r ~/.gradle/caches/modules-2/files-2.1/com.android.tools.build/gradle/8.5.1/* agp-cache/com/android/tools/build/gradle/8.5.1/

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add agp-cache/
          git commit -m "Add AGP 8.5.1 cache files [skip ci]" || echo "No changes"
          git push origin main
