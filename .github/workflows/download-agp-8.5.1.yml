name: agp new repoo

on:
  workflow_dispatch:

jobs:
  save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download AGP 8.5.1 using Gradle
        run: |
          mkdir -p gradle-project
          cd gradle-project
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.5.1'
              }
          }
          apply plugin: 'java'
          repositories {
              google()
              mavenCentral()
          }
          dependencies {
              implementation 'com.android.tools.build:gradle:8.5.1'
          }
          EOF
          gradle dependencies --refresh-dependencies --no-daemon

      - name: Copy AGP 8.5.1 cache to repo folder
        run: |
          mkdir -p agp-cache/8.5.1
          cp -r ~/.gradle/caches/modules-2/files-2.1/com.android.tools.build/gradle/8.5.1/* agp-cache/8.5.1/

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add agp-cache/
          git commit -m "Add AGP 8.5.1 cache files [skip ci]" || echo "No changes"
          git push origin main
