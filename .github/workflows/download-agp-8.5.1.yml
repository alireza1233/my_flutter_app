name: Download AGP 8.5.1

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Create minimal Gradle project
        run: |
          mkdir -p temp
          cd temp
          cat > build.gradle <<EOF
          buildscript {
              repositories {
                  mavenCentral()
                  google()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.5.1'
              }
          }
          apply plugin: 'java'
          repositories {
              mavenCentral()
              google()
          }
          dependencies {
              implementation 'com.android.tools.build:gradle:8.5.1'
          }
          EOF
      - name: Download dependencies
        run: |
          cd temp
          gradle dependencies --refresh-dependencies --no-daemon
      - name: Upload Gradle caches
        uses: actions/upload-artifact@v4
        with:
          name: agp-8.5.1-cache
          path: ~/.gradle/caches/modules-2/files-2.1/com.android.tools.build/gradle/8.5.1/
