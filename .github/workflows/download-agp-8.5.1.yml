name: Get AGP 8.5.1 Correctly

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Gradle project and resolve AGP 8.5.1
        run: |
          mkdir -p gradle-project
          cd gradle-project
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.5.1'
              }
          }
          apply plugin: 'java'
          repositories {
              google()
              mavenCentral()
          }
          dependencies {
              implementation 'com.android.tools.build:gradle:8.5.1'
          }
          EOF
          gradle dependencies --no-daemon

      - name: Copy AGP 8.5.1 folder
        run: |
          mkdir -p agp-8.5.1
          cp -r ~/.gradle/caches/modules-2/files-2.1/com.android.tools.build/gradle/8.5.1 agp-8.5.1/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agp-8.5.1-full
          path: agp-8.5.1/
